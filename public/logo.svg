<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#0099FF;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#9D00FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF00FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9D00FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FFFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Lightning bolt with gradient -->
  <path d="M120 30 L80 100 L110 100 L70 170 L130 90 L100 90 L120 30 Z" 
        fill="url(#grad1)" 
        filter="url(#glow)"
        stroke="url(#grad2)" 
        stroke-width="2"/>
  
  <!-- Document layers -->
  <rect x="50" y="60" width="60" height="80" rx="4" 
        fill="none" 
        stroke="url(#grad1)" 
        stroke-width="3" 
        opacity="0.6"
        filter="url(#glow)"/>
  
  <rect x="60" y="70" width="60" height="80" rx="4" 
        fill="none" 
        stroke="url(#grad2)" 
        stroke-width="3" 
        opacity="0.8"
        filter="url(#glow)"/>
  
  <!-- Accent dots for tech feel -->
  <circle cx="140" cy="50" r="4" fill="#00FFFF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="155" cy="70" r="3" fill="#FF00FF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="45" cy="130" r="3" fill="#9D00FF" opacity="0.8" filter="url(#glow)"/>
</svg>
